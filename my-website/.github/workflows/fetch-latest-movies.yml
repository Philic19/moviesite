
name: Fetch Latest Movies

on:
  push:
    branches:
      - main  # or your main branch name
  workflow_dispatch:  # lets you run manually if you want

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Fetch latest movies
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          node scripts/fetch-latest-movies.js

      - name: Commit & push updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest-movies.json
          git commit -m "Update latest movies data [skip ci]" || echo "No changes"
          git push
